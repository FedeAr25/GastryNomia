{%extends 'base.html'%}
{%block body%}
<section class="bg-white md:m-2 md:rounded-lg flex-1 overflow-y-auto mt-16 md:mt-0">
    <div class="p-4 sm:p-6 md:p-8">
        <header class="border-b pb-4 mb-6">
            <h1 class="text-3xl font-bold text-orange-500">Crear Nueva Receta</h1>
            <p class="text-gray-600">Comparte tu receta con la comunidad de Tia Luci</p>
        </header>

        <form class="space-y-6 md:space-y-8 lg:space-y-10">
            <div class="flex flex-col md:flex-row gap-6 md:gap-8 lg:gap-10">
                <div class="w-full md:w-1/3 lg:w-1/4">
                    <div
                        class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer hover:border-orange-400 transition-colors">
                        <div class="flex flex-col items-center justify-center h-64 bg-gray-50 rounded-md">
                            <i class="fa-solid fa-image text-5xl text-gray-300 mb-3"></i>
                            <p class="text-gray-500 font-medium">Haz clic para subir una imagen</p>
                            <p class="text-sm text-gray-400 mt-1">Recomendado: 800x600px</p>
                        </div>
                        <input type="file" class="hidden" accept="image/*">
                    </div>
                </div>

                <div class="flex-1 space-y-4 md:space-y-6 lg:space-y-8">
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Nombre de la receta</label>
                        <input type="text"
                            class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-400 focus:border-transparent"
                            placeholder="Ej: Tarta de manzana vegana">
                    </div>

                    <div class="grid grid-cols-3 gap-4 md:gap-6 lg:gap-8">
                        <div>
                            <label class="block text-gray-700 font-medium mb-1">Tiempo</label>
                            <div class="relative">
                                <input type="text" class="w-full p-2 border border-gray-300 rounded-md pl-10"
                                    placeholder="30 min">
                                <i class="fa-regular fa-clock absolute left-3 top-3 text-gray-400"></i>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700 font-medium mb-1">Porciones</label>
                            <div class="relative">
                                <input type="text" class="w-full p-2 border border-gray-300 rounded-md pl-10"
                                    placeholder="4">
                                <i class="fa-solid fa-utensils absolute left-3 top-3 text-gray-400"></i>
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700 font-medium mb-1">Dificultad</label>
                            <select class="w-full p-2 border border-gray-300 rounded-md">
                                <option>Fácil</option>
                                <option>Media</option>
                                <option>Difícil</option>
                                <option>Extrema</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Categoría</label>
                        <div class="flex flex-wrap gap-2">
                            <span
                                class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-orange-100 text-orange-800">
                                <i class="fa-solid fa-utensils mr-1"></i> Principal
                                <button class="ml-2 text-orange-500 hover:text-orange-700">×</button>
                            </span>
                            <button class="text-orange-500 hover:text-orange-700 text-sm flex items-center">
                                <i class="fa-solid fa-plus mr-1"></i> Añadir categoría
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-gray-50 p-4 rounded-lg">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fa-solid fa-list-check text-orange-500 mr-2"></i>
                    Ingredientes
                </h2>
                <div class="space-y-3 mb-4">
                    <div class="flex gap-2">
                        <input type="text" class="flex-1 p-2 border border-gray-300 rounded-md"
                            placeholder="Ej: 2 tazas de harina">
                        <button type="button" class="px-3 bg-orange-500 text-white rounded-md hover:bg-orange-600">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                    <div class="bg-white p-3 rounded-md border flex justify-between items-center">
                        <span>1 cucharada de aceite de oliva</span>
                        <button class="text-red-400 hover:text-red-600">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                    <div class="bg-white p-3 rounded-md border flex justify-between items-center">
                        <span>3 dientes de ajo picados</span>
                        <button class="text-red-400 hover:text-red-600">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-gray-50 p-4 rounded-lg">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fa-solid fa-list-ol text-orange-500 mr-2"></i>
                    Instrucciones
                </h2>
                <div class="space-y-4">
                    <div class="flex gap-3">
                        <span
                            class="bg-orange-500 text-white rounded-full w-6 h-6 flex items-center justify-center flex-shrink-0">1</span>
                        <textarea class="flex-1 p-2 border border-gray-300 rounded-md h-20"
                            placeholder="Describe el primer paso de la receta"></textarea>
                    </div>
                    <div class="flex gap-3">
                        <span
                            class="bg-orange-500 text-white rounded-full w-6 h-6 flex items-center justify-center flex-shrink-0">2</span>
                        <textarea class="flex-1 p-2 border border-gray-300 rounded-md h-20"
                            placeholder="Describe el segundo paso"></textarea>
                    </div>
                    <button type="button" class="text-orange-500 hover:text-orange-700 text-sm flex items-center">
                        <i class="fa-solid fa-plus mr-1"></i> Añadir paso
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-1">Notas adicionales</label>
                <textarea class="w-full p-3 border border-gray-300 rounded-md h-24"
                    placeholder="¿Algún consejo, variante o información nutricional que quieras compartir?"></textarea>
            </div>

            <div class="flex justify-end gap-3 pt-4 border-t">
                <button type="button"
                    class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
                    Descartar
                </button>
                <button type="submit"
                    class="px-6 py-2 bg-orange-500 text-white rounded-md hover:bg-orange-600 flex items-center">
                    <i class="fa-solid fa-upload mr-2"></i>
                    Publicar receta
                </button>
            </div>
        </form>
</section>
{%endblock%}
