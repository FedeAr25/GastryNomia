{% extends 'base.html' %}
{% block body %}
<div class="flex flex-col w-full h-screen justify-center items-center gap-8">

    <h1 class="text-3xl md:text-4xl font-bold text-orange-500 mb-2">
        Inicia Sesion
    </h1>
    <form method="post" class="flex flex-col gap-6 
    [&_input]:w-full [&_input]:px-4 [&_input]:py-2 [&_input]:border [&_input]:border-gray-300 [&_input]:rounded-lg [&_input]:focus:ring-2 [&_input]:focus:ring-blue-500
    [&_label]:block [&_label]:text-sm [&_label]:font-medium [&_label]:text-gray-700">
        {%csrf_token%}
        {{ form.as_p }}

        <button type="submit"
            class="px-6 py-3 bg-orange-200 text-gray-700 font-medium rounded-lg border border-orange-300 shadow-sm hover:bg-orange-300 transition duration-300 transform hover:-translate-y-0.5">Enviar</button>
        <a href="{% url 'register' %}"
            class="px-6 py-3 bg-green-200 text-gray-700 font-medium rounded-lg border border-green-300 shadow-sm hover:bg-green-300 transition duration-300 transform hover:-translate-y-0.5">¿No
            tenes Cuenta? Registrate</a>
    </form>
</div>
{% endblock %}
